[project]
name = 'Decentralized-KYC-Credential-NFTs'
description = 'A decentralized solution for managing KYC credentials using NFTs with analytics system'
authors = ['treasuredachomo637']
telemetry = true
cache_dir = '.cache'
requirements = []

[contracts.kyc-credentials]
path = 'contracts/kyc-credentials.clar'
clarity_version = 3
epoch = 3.1

[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'

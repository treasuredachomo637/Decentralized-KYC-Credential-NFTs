name: CI

on: [push]

jobs:
  tests:
    name: "Charity Donation Tracker – Syntax & Deployment Plan Check"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Check contract syntax"
        uses: docker://hirosystems/clarinet:latest
        with:
          args: check
          
      - name: "Validate deployment plan"
        uses: docker://hirosystems/clarinet:latest
        with:
          args: deployments check

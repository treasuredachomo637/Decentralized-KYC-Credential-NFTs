name: CI
on: [push, pull_request]
jobs:
  tests:
    name: "KYC Credentials with Reputation System"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3
      - name: "Check contract syntax"
        uses: docker://hirosystems/clarinet:latest
        with:
          args: check
